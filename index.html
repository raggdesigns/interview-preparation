<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Preparations</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --content-max-width: 50em;
    }
    /* Mobile-friendly tables */
    .markdown-section table {
      display: block;
      overflow-x: auto;
      white-space: nowrap;
    }
    /* Mobile-friendly code blocks */
    .markdown-section pre {
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Interview Preparations',
      repo: 'dradisic/interview_preparations',
      loadSidebar: true,
      relativePath: true,
      subMaxLevel: 2,
      search: {
        placeholder: 'Search topics...',
        noData: 'No results.',
        depth: 6
      },
      auto2top: true
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-php.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-docker.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-http.min.js"></script>

</html>
